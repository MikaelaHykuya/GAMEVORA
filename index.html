<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <title>GVR - Digital Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GAMEVORA">
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192x192.png?v=2">
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512x512.png?v=2">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  </head>
  <body class="selection:bg-purple-500">
    <div id="splash-screen" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#030303;z-index:99999">
      <div style="width:64px;height:64px;border:3px solid rgba(168,85,247,0.2);border-top-color:#a855f7;border-radius:50%;animation:spin 1s linear infinite"></div>
      <p style="margin-top:24px;font-size:10px;color:rgba(168,85,247,0.6);font-weight:800;text-transform:uppercase;letter-spacing:0.3em;font-family:sans-serif">Loading Vault...</p>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
